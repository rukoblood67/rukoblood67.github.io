<!DOCTYPE html>
<html>
  <head>
    <title>Sajt</title>
    <style>
     body {
       -webkit-user-select: none; /* Safari */
       -ms-user-select: none;     /* IE 10 and older */
       user-select: none;         /* Standard syntax */
}

    </style>
  </head>
  <body>
    <h1>Odpowiedz na wszystkie pytania prawidłowo i otrzymasz literę</h1>
    
    <br>
    <h2 id="pytanie">W którym roku powstała szkoła w Niemenczynie?</h2>
    <br>
    <input placeholder="Odpowiedz" type="number" id="odp" autofocus/></br><button onclick="sprawdzic()">Potwierdzic</button>
    
    <br>
    <h2 id="prawidlowo"></h2>
    <script>
      var Nr_woprosa = 1;
      const input = document.getElementById("odp");
      const tekstPytania = document.getElementById("pytanie");
      const prawidlowo = document.getElementById("prawidlowo");
      
      function sprawdzic() {
        const odp = input.value;
        console.log(odp);
        
        if (Nr_woprosa === 1 && odp === "1865") {
          prawidlowo.textContent = "Prawidlowo! Nastepne pytanie:";
          Nr_woprosa = 2;
          input.value = ""
          input.focus()
          pytanie.textContent = "Kiedy urodzil sie patron gimnazjum Konstanty Parczewski?"
        }
        else if (Nr_woprosa === 1 && odp !== "1865") {
          prawidlowo.textContent = "Nieprawidlowo! Probuj jeszcze raz";
        }
        
        
        else if (Nr_woprosa === 2 && odp === "1801") {
          prawidlowo.textContent = "Prawidlowo! Nastepne pytanie:";
          Nr_woprosa = 3;
          pytanie.textContent = "Którą rocznicę założenia obchodziło w tym roku Gimnazjum im. K. Parczewskiego?"
        }
        else if (Nr_woprosa === 2 && odp !== "1801") {
          prawidlowo.textContent = "Nieprawidlowo! Probuj jeszcze raz";
        }
        
      
        else if (Nr_woprosa === 3 && odp === "160") {
          prawidlowo.textContent = "Prawidlowo!";
          pytanie.textContent = "Twoja litera to: A"
        }
        else if (Nr_woprosa === 3 && odp !== "160") {
          prawidlowo.textContent = "Nieprawidlowo! Probuj jeszcze raz";
        }
      }
      
    </script>
  </body>
</html>
